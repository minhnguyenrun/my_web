<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholar Share - Chỉnh Sửa Trang</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #1a2533; 
      --dropdown-bg: #1e1e1e;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #333;
      display: flex;
      min-height: 100vh;
    }

    html {
      height: 100%;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background-color: var(--primary-dark);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 1000;
    }

    .sidebar-header {
      padding: 30px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }

    .sidebar-header h2 {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 24px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 0;
    }

    .sidebar-nav a {
      display: block;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 15px 25px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background-color: rgba(255,255,255,0.1);
      color: white;
      border-left-color: white;
      padding-left: 30px;
    }

    /* Main Content Wrapper */
    .main-wrapper {
      margin-left: 250px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      flex-shrink: 0;
    }

    /* Top Bar */
    .top-header {
      background-color: var(--primary-dark);
      padding: 15px 40px;
      color: white;
      font-size: 14px;
    }

    #current-page-name {
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Hero Section */
    .hero-section {
      background-color: var(--primary-dark);
      height: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo-box {
      border: 3px solid white;
      padding: 20px 60px;
    }

    .logo-box h1 {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 50px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* Nội dung chính */
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
      width: 100%;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #495057;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
      margin-right: 10px;
    }

    .btn:hover {
      background-color: #218838;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
    }

    footer {
      background-color: var(--primary-dark);
      color: white;
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .social-links {
      margin: 20px 0;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .social-links a:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .facebook-icon {
      width: 24px;
      height: 24px;
      display: inline-block;
    }

    .footer-text {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin: 10px 0;
    }

    .section {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
      background-color: #f9f9f9;
    }

    .section .ql-container {
      min-height: 150px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 30px;
      border-radius: 8px;
      width: 80%;
      max-width: 500px;
      text-align: center;
    }

    .image-preview {
      margin-top: 10px;
      max-width: 100%;
    }

    .image-preview img {
      max-width: 100%;
      border-radius: 5px;
    }

    .image-scale-modal .modal-content {
      max-width: 700px;
    }

    #image-canvas {
      max-width: 100%;
      border: 1px solid #ddd;
      margin: 20px 0;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .scale-controls {
      margin: 15px 0;
    }

    .scale-controls label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .scale-controls input[type="range"] {
      width: 100%;
    }

    .scale-info {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h2>SCHOLAR<br>SHARE</h2>
    </div>
    <nav class="sidebar-nav">
      <a href="/index.html">Trang Chủ</a>
      <a href="/about.html">Về Chúng Tôi</a>
      <a href="/admin.html">Quản Lý</a>
      <a href="/profiles.html">Hồ Sơ Học Bổng</a>
    </nav>
  </div>

  <div class="main-wrapper">
    <header>
      <div class="top-header">
        <span id="current-page-name">CHỈNH SỬA TRANG</span>
      </div>

      <div class="hero-section">
        <div class="logo-box">
          <h1>SCHOLAR SHARE</h1>
        </div>
      </div>
    </header>

  <div class="container">
    <h2 id="page-title">Chỉnh Sửa Trang</h2>
    
    <form id="page-form">
      <h3>Nội dung chi tiết</h3>
      <div id="sections">
        <!-- Sections will be loaded -->
      </div>
      <button type="button" class="btn btn-secondary" onclick="addSection()">Thêm Phần</button>
      <br><br>

      <button type="submit" class="btn">Lưu Thay Đổi</button>
      <button type="button" class="btn btn-secondary" onclick="window.location.href='/admin.html'">Quay Lại</button>
    </form>
  </div>

  <div id="add-section-modal" class="modal">
    <div class="modal-content">
      <h3>Chọn loại phần muốn thêm</h3>
      <button class="btn" onclick="chooseSectionType('text')">Thêm Text</button>
      <button class="btn btn-secondary" onclick="chooseSectionType('image')">Thêm Hình Ảnh</button>
      <br><br>
      <button class="btn btn-danger" onclick="closeModal()">Hủy</button>
    </div>
  </div>

  <div id="image-scale-modal" class="modal image-scale-modal">
    <div class="modal-content">
      <h3>Điều chỉnh kích thước ảnh</h3>
      <canvas id="image-canvas"></canvas>
      <div class="scale-controls">
        <label for="scale-slider">Kích thước: <span id="scale-value">100</span>%</label>
        <input type="range" id="scale-slider" min="10" max="200" value="100" step="5">
      </div>
      <div class="scale-info">
        Kích thước gốc: <span id="original-size"></span> | 
        Kích thước mới: <span id="new-size"></span>
      </div>
      <br>
      <button class="btn" onclick="applyImageScale()">Áp dụng</button>
      <button class="btn btn-danger" onclick="cancelImageScale()">Hủy</button>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <p class="footer-text">Kết nối với chúng tôi</p>
      <div class="social-links">
        <a href="https://www.facebook.com/profile.php?id=61582021168672" target="_blank" rel="noopener noreferrer">
          <svg class="facebook-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </a>
      </div>
    </div>
  </footer>

  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script>
    let pageId = null;
    let quills = [];
    let currentImageFile = null;
    let currentImageInput = null;
    let originalImage = null;
    let canvas = null;
    let ctx = null;

    function createQuill(element) {
      const quill = new Quill(element, {
        theme: 'snow',
        modules: {
          toolbar: [
            [{ 'size': ['small', false, 'large', 'huge'] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'align': [] }],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            ['link', 'image'],
            ['clean']
          ]
        },
        placeholder: 'Nội dung phần...'
      });
      quills.push(quill);
      return quill;
    }

    // Get page ID from URL
    const urlParams = new URLSearchParams(location.search);
    pageId = urlParams.get('id');

    if (pageId) {
      // Load existing page data
      fetch(`/api/pages/${pageId}`)
        .then(r => r.json())
        .then(page => {
          if (!page) {
            alert("Không tìm thấy trang");
            window.location.href = '/admin.html';
            return;
          }
          document.getElementById('page-title').textContent = `Chỉnh Sửa - ${page.title}`;
          
          // Load sections
          if (page.sections && page.sections.length > 0) {
            page.sections.forEach(section => {
              addSectionElement(section.type || 'text', section.content);
            });
          } else {
            addSectionElement('text', '');
          }
        });
    } else {
      alert("Không tìm thấy trang");
      window.location.href = '/admin.html';
    }

    function addSectionElement(type = 'text', content = '') {
      const div = document.createElement('div');
      div.className = 'section';
      if (type === 'image') {
        div.innerHTML = `
          <input type="file" class="section-file" accept="image/*" onchange="uploadImage(this)">
          <div class="image-preview">${content ? `<img src="/api/page-images/${content}" style="max-width:100%;">` : ''}</div>
          <button type="button" class="btn btn-secondary" onclick="removeSection(this)">Xóa Phần</button>
        `;
        if (content && !isNaN(content)) {
          setTimeout(() => {
            const fileEl = div.querySelector('.section-file');
            fileEl.dataset.id = content;
          }, 0);
        }
      } else {
        div.innerHTML = `
          <div class="editor-container"></div>
          <button type="button" class="btn btn-secondary" onclick="removeSection(this)">Xóa Phần</button>
        `;
        document.getElementById('sections').appendChild(div);
        const quill = createQuill(div.querySelector('.editor-container'));
        if (content) {
          quill.setContents(quill.clipboard.convert(content));
        }
        return;
      }
      document.getElementById('sections').appendChild(div);
    }

    function addSection() {
      document.getElementById('add-section-modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('add-section-modal').style.display = 'none';
    }

    function chooseSectionType(type) {
      addSectionElement(type, '');
      closeModal();
    }

    function removeSection(btn) {
      if (confirm('Xóa phần này?')) {
        btn.closest('.section').remove();
      }
    }

    async function uploadImage(input) {
      const file = input.files[0];
      if (!file) return;
      showImageScaleModal(file, input);
    }

    function showImageScaleModal(file, input) {
      currentImageFile = file;
      currentImageInput = input;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        originalImage = new Image();
        originalImage.onload = function() {
          canvas = document.getElementById('image-canvas');
          ctx = canvas.getContext('2d');
          
          // Set canvas size to fit modal
          const maxWidth = 500;
          const maxHeight = 400;
          let { width, height } = fitImageToCanvas(originalImage.width, originalImage.height, maxWidth, maxHeight);
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(originalImage, 0, 0, width, height);
          
          document.getElementById('original-size').textContent = `${originalImage.width} x ${originalImage.height}`;
          document.getElementById('new-size').textContent = `${width} x ${height}`;
          document.getElementById('scale-value').textContent = '100';
          document.getElementById('scale-slider').value = '100';
          
          // Add slider event
          const slider = document.getElementById('scale-slider');
          slider.oninput = function() {
            const scale = this.value / 100;
            const newWidth = Math.round(originalImage.width * scale);
            const newHeight = Math.round(originalImage.height * scale);
            
            let { width: canvasWidth, height: canvasHeight } = fitImageToCanvas(newWidth, newHeight, maxWidth, maxHeight);
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            ctx.drawImage(originalImage, 0, 0, canvasWidth, canvasHeight);
            
            document.getElementById('scale-value').textContent = this.value;
            document.getElementById('new-size').textContent = `${newWidth} x ${newHeight}`;
          };
          
          document.getElementById('image-scale-modal').style.display = 'block';
        };
        originalImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function fitImageToCanvas(imgWidth, imgHeight, maxWidth, maxHeight) {
      let ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);
      if (ratio > 1) ratio = 1;
      return {
        width: Math.round(imgWidth * ratio),
        height: Math.round(imgHeight * ratio)
      };
    }

    function applyImageScale() {
      if (!canvas || !ctx) {
        alert('Canvas not ready');
        return;
      }
      
      try {
        const scale = document.getElementById('scale-slider').value / 100;
        const newWidth = Math.round(originalImage.width * scale);
        const newHeight = Math.round(originalImage.height * scale);
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = newWidth;
        tempCanvas.height = newHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(originalImage, 0, 0, newWidth, newHeight);
        
        tempCanvas.toBlob(function(blob) {
          if (!blob) {
            alert('Failed to create blob');
            return;
          }
          const scaledFile = new File([blob], currentImageFile.name, { type: currentImageFile.type });
          
          const formData = new FormData();
          formData.append('image', scaledFile);
          
          fetch('/api/upload', {
            method: 'POST',
            body: formData
          }).then(r => {
            if (!r.ok) {
              throw new Error('Upload failed: ' + r.status);
            }
            return r.json();
          }).then(data => {
            if (data.id) {
              const preview = currentImageInput.nextElementSibling;
              if (preview) {
                preview.innerHTML = `<img src="/api/temp-images/${data.id}" style="max-width:100%;">`;
              }
              currentImageInput.dataset.id = data.id;
              closeImageScaleModal();
            } else {
              alert('Upload failed: no id returned');
            }
          }).catch(err => {
            console.error('Upload error:', err);
            alert('Upload error: ' + err.message);
          });
        }, currentImageFile.type);
      } catch (err) {
        console.error('Scale error:', err);
        alert('Error: ' + err.message);
      }
    }

    function cancelImageScale() {
      closeImageScaleModal();
      if (currentImageInput) {
        currentImageInput.value = '';
      }
    }

    function closeImageScaleModal() {
      document.getElementById('image-scale-modal').style.display = 'none';
      currentImageFile = null;
      currentImageInput = null;
      originalImage = null;
    }

    // Handle form submission
    document.getElementById('page-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const sections = [];

      document.querySelectorAll('#sections .section').forEach((sectionEl, index) => {
        const editorContainer = sectionEl.querySelector('.editor-container');
        if (editorContainer) {
          const quillIndex = Array.from(document.querySelectorAll('.editor-container')).indexOf(editorContainer);
          const content = quills[quillIndex].root.innerHTML;
          sections.push({ type: 'text', content });
        } else {
          const fileInput = sectionEl.querySelector('.section-file');
          const imageId = fileInput.dataset.id;
          if (imageId) {
            sections.push({ type: 'image', content: parseInt(imageId) });
          }
        }
      });

      try {
        const response = await fetch(`/api/pages/${pageId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ sections })
        });

        const result = await response.json();
        if (response.ok) {
          alert('Cập nhật thành công');
          window.location.href = '/admin.html';
        } else {
          alert('Lỗi: ' + result.error);
        }
      } catch (err) {
        alert('Lỗi: ' + err.message);
      }
    });

    window.onclick = function(event) {
      if (event.target.classList.contains('modal')) {
        event.target.style.display = 'none';
      }
    }
  </script>
  </div>

</body>
</html>
